version: "3.9"

services:

  neo4j:
    image: neo4j:5
    container_name: cognee-neo4j
    restart: always
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/StrongPasswordHere
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 2G
      NEO4J_server_memory_heap_max__size: 4G
      NEO4J_server_memory_pagecache_size: 2G
      NEO4J_server_default__listen__address: 0.0.0.0
      NEO4J_server_bolt_advertised__address: 34.228.41.77:7687
      NEO4J_server_http_advertised__address: 34.228.41.77:7474
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p StrongPasswordHere 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5


  postgres:
    image: pgvector/pgvector:pg17
    container_name: cognee-postgres
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: cognee
      POSTGRES_PASSWORD: StrongPostgresPassword
      POSTGRES_DB: cognee_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cognee -d cognee_db"]
      interval: 15s
      timeout: 5s
      retries: 5


  text2sql-neo4j:
    image: neo4j:5
    container_name: text2sql-neo4j
    restart: always
    ports:
      - "7475:7474"
      - "7688:7687"
    environment:
      NEO4J_AUTH: neo4j/Text2SqlPassword
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 1G
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache_size: 1G
      NEO4J_server_default__listen__address: 0.0.0.0
      NEO4J_server_bolt_advertised__address: 34.228.41.77:7688
      NEO4J_server_http_advertised__address: 34.228.41.77:7475
    volumes:
      - text2sql_neo4j_data:/data
      - text2sql_neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p Text2SqlPassword 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5


volumes:
  neo4j_data:
  neo4j_logs:
  postgres_data:
  text2sql_neo4j_data:
  text2sql_neo4j_logs: